  <rect x="620" y="330" width="220" height="78" class="box"/>
  <text x="730" y="375" text-anchor="middle" class="label">Migrations/CreateStudent.swift</text>

  <rect x="880" y="330" width="220" height="78" class="box"/>
  <text x="990" y="375" text-anchor="middle" class="label">Routes/routes.swift</text>

  <rect x="810" y="470" width="250" height="78" class="box"/>
  <text x="935" y="515" text-anchor="middle" class="label">Controllers/AuthController.swift</text>

  <rect x="520" y="470" width="240" height="78" class="box"/>
