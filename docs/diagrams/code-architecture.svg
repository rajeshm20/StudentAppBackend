  <rect x="220" y="610" width="220" height="78" class="box"/>
  <text x="330" y="655" text-anchor="middle" class="label">Services/StudentService.swift</text>

  <rect x="810" y="610" width="220" height="78" class="box"/>
  <text x="920" y="655" text-anchor="middle" class="label">Models/Student.swift</text>

  <rect x="1040" y="610" width="130" height="78" class="box"/>
  <text x="1105" y="655" text-anchor="middle" class="label">StudentToken.swift</text>

