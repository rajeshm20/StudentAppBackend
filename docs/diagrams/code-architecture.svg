<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Code Architecture Diagram</title>
  <desc id="desc">Code architecture diagram for the Vapor application structure.</desc>
  <defs>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .box { fill: #f8fafc; stroke: #2563eb; stroke-width: 2; rx: 14; ry: 14; }
      .db { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 16; ry: 16; }
      .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#ffffff"/>
  <text x="40" y="46" class="title">Code Architecture Diagram</text>

  <rect x="500" y="80" width="200" height="70" class="box"/>
  <text x="600" y="122" text-anchor="middle" class="label">entrypoint.swift</text>

  <rect x="470" y="190" width="260" height="78" class="box"/>
  <text x="600" y="235" text-anchor="middle" class="label">Configure/configure.swift</text>

